version: "3.9"

services:
  city-report-api:
    container_name: city-report-api
    image: smartcity/urban-report-api:${IMAGE_TAG}

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

    restart: unless-stopped

    networks:
      - city-network

networks:
  city-network:
    driver: bridge