spring:
  application:
#    name: ${APP_NAME:smart-city-api}
    name: smart-city-api
  profiles:
#    active: ${SPRING_PROFILES_ACTIVE:dev}
    active: local
    group:
      local:
        - kafka
        - redis
      dev:
        - kafka
        - redis
      prod:
        - kafka
        - kafka-prod
        - redis
        - redis-prod

  task:
    execution:
      thread-name-prefix: smart-city-async-
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
        keep-alive: 60s

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

server:
#  port: ${SERVER_PORT:8080}
  port: 8080
  shutdown: graceful
#  servlet:
#    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

