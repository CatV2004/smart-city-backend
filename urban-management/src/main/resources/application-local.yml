spring:
  datasource:
#    url: jdbc:postgresql://${DB_HOST:city-report-db}:${DB_PORT:5432}/${DB_NAME:city_report_db}
#    username: ${DB_USERNAME:postgres}
#    password: ${DB_PASSWORD:postgres}
    url: jdbc:postgresql://localhost:5432/city_report_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true

  flyway:
    enabled: true

  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true

  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE