version: "3.9"

services:
  city-report-api:
    container_name: city-report-api-dev

    build:
      context: .
      dockerfile: Dockerfile.dev

    working_dir: /workspace

    volumes:
      - .:/workspace
      - ~/.m2:/root/.m2

    env_file:
      - .env

    command: mvn spring-boot:run

    ports:
      - "${SERVER_PORT:-8080}:8080"
      - "5005:5005"   # debug port

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    depends_on:
      city-report-db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started

    networks:
      - backend

  city-report-db:
    container_name: city-report-db

    image: postgis/postgis:17-3.6-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME:-city_report_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}

    ports:
      - "${DB_PORT:-5432}:5432"

    volumes:
      - city-report-db-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    container_name: city-report-redis

    ports:
      - "6379:6379"

    networks:
      - backend

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: city-report-zookeeper

    ports:
      - "2181:2181"

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: city-report-kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # listener cho container + máy host
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  city-report-db-data: